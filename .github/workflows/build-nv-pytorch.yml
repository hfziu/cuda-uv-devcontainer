name: Build and Push NVIDIA PyTorch Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-nv-pytorch.yml"
      - "Dockerfile.nv-pytorch"
      - "scripts/build-nv-pytorch.sh"
      - "scripts/utils.sh"
      - ".dockerignore"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cuda-uv-devcontainer
  NV_PYTORCH_IMAGE: nvcr.io/nvidia/pytorch
  NV_PYTORCH_BASE_TAG: "26.01-py3"
  NV_PYTORCH_TAG_PREFIX: "nv-pytorch"

jobs:
  build-and-push-nv-pytorch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build NVIDIA PyTorch image
        env:
          NV_PYTORCH_IMAGE: ${{ env.NV_PYTORCH_IMAGE }}
          NV_PYTORCH_BASE_TAG: ${{ env.NV_PYTORCH_BASE_TAG }}
          NV_PYTORCH_TAG_PREFIX: ${{ env.NV_PYTORCH_TAG_PREFIX }}
          ACTION: build
        run: |
          bash scripts/build-nv-pytorch.sh

      - name: Push NVIDIA PyTorch image
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          NV_PYTORCH_BASE_TAG: ${{ env.NV_PYTORCH_BASE_TAG }}
          NV_PYTORCH_TAG_PREFIX: ${{ env.NV_PYTORCH_TAG_PREFIX }}
          ACTION: push
        run: |
          bash scripts/build-nv-pytorch.sh
