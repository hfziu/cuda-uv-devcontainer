name: Build and Push CUDA Habitat Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-cuda-habitat.yml"
      - "Dockerfile.cuda-habitat"
      - "scripts/build-cuda-habitat.sh"
      - "scripts/test-habitat.sh"
      - "scripts/utils.sh"
      - ".dockerignore"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cuda-uv-devcontainer
  CUDA_HABITAT_BASE_TAG: "12.9.1-cudnn-devel-ubuntu24.04"
  CUDA_HABITAT_TAG: "cuda-habitat"
  UV_PYTHONS: ${{ vars.UV_PYTHONS || '3.10 3.11 3.12 3.13' }}
  HABITAT_PYTHON: "3.12"

jobs:
  build-and-push-cuda-habitat:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build CUDA Habitat image
        env:
          CUDA_HABITAT_BASE_TAG: ${{ env.CUDA_HABITAT_BASE_TAG }}
          CUDA_HABITAT_TAG: ${{ env.CUDA_HABITAT_TAG }}
          UV_PYTHONS: ${{ env.UV_PYTHONS }}
          HABITAT_PYTHON: ${{ env.HABITAT_PYTHON }}
          ACTION: build
        run: |
          bash scripts/build-cuda-habitat.sh

      - name: Smoke test CUDA Habitat image
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:${{ env.CUDA_HABITAT_TAG }}
        run: |
          bash scripts/test-habitat.sh

      - name: Push CUDA Habitat image
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          CUDA_HABITAT_TAG: ${{ env.CUDA_HABITAT_TAG }}
          ACTION: push
        run: |
          bash scripts/build-cuda-habitat.sh
